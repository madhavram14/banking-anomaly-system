name: Banking Audit Pipeline

on:
  push:
    branches: [ main ]  # This triggers the "Robot" every time you push code

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas

    - name: Run Banking Pipeline
      run: |
        python day2_generator.py
        python ingest_to_sql.py
        python anomaly_detector.py

    - name: Upload Audit Report
      uses: actions/upload-artifact@v4
      with:
        name: bank-audit-report
        path: audit_report.html